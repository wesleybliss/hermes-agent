version: "3.8"
services:
  hermes:
    #image: nousresearch/hermes-agent:latest
    build: .
    container_name: hermes
    restart: unless-stopped
    
    # For running locally on a laptop/etc., use current user
    #user: "1000:1000"
    
    # For running on a VPS, use root
    user: root
    
    env_file:
      - $HOME/.hermes/.env
    command: gateway run
    volumes:
      - ~/.hermes:/opt/data:Z
      - ./share:/opt/share:Z
    # Uncomment to forward specific env vars instead of using .env file:
    #environment:
    #  - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    #  - OPENAI_API_KEY=${OPENAI_API_KEY}
    #  - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.0"
